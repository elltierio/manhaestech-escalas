<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login • ManhãesTech Escalas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body class="app-bg text-light">
    <main class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
      <div class="card card-glass p-4" style="max-width: 420px; width: 100%;">
        <h1 class="h4 mb-3 fw-semibold">ManhãesTech Escalas</h1>
        <p class="text-secondary mb-4">Login de administrador</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-glass" role="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('auth.login_post') }}">
          <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input class="form-control form-control-dark" name="username" autocomplete="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input class="form-control form-control-dark" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary w-100">Entrar</button>
        </form>

        <div class="mt-3 small text-secondary text-center">
          Criado por Felipe Manhães / ManhãesTech
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
